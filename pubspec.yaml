name: junior_football
description: "A new Flutter project."


publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.10.8


dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  talker_dio_logger: ^5.1.13
  retrofit: ^4.9.2
  easy_localization: ^3.0.8
  injectable: ^2.7.1+4
  get_it: ^9.2.1
  shared_preferences: ^2.5.4
  flutter_secure_storage: ^10.0.0
  envied: ^1.3.3
  flutter_native_splash: ^2.4.7
  skeletonizer: ^2.1.3
  equatable: ^2.0.8
  flutter_bloc: ^9.1.1
  json_annotation: ^4.11.0
  build_runner: ^2.11.1
  dio: ^5.9.1
  flutter_screenutil: ^5.9.3
  pinput: ^6.0.2

  google_sign_in: ^7.2.0
  flutter_svg: ^2.2.4
  percent_indicator: ^4.2.5
  google_fonts: ^8.0.2
  image_picker: ^1.2.2
  cached_network_image: ^3.4.1
  media_kit: ^1.2.6
  media_kit_video: ^2.0.1
  media_kit_libs_video: ^1.0.7
  camera: ^0.12.0+1
  video_player: ^2.11.1
  gal: ^2.3.2
  flutter_markdown_plus: ^1.0.7
  shimmer: ^3.0.0
  google_sign_in_android: ^7.2.11





dev_dependencies:
  flutter_test:
    sdk: flutter
  retrofit_generator: ^10.2.3
  flutter_lints: ^6.0.0
  json_serializable: ^6.13.0
  envied_generator: ^1.3.3
  injectable_generator: ^2.12.0


flutter:


  uses-material-design: true


  assets:
    - assets/translations/
    - assets/images/
    - assets/images/svg/
    - assets/fonts/
    - assets/svgs/




  fonts:
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-Medium.ttf
          weight: 500
        - asset: assets/fonts/Nunito-Regular.ttf
          weight: 400
        - asset: assets/fonts/Nunito-SemiBold.ttf
          weight: 600
